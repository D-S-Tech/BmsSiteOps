# =============================================================================
# BmsSiteOps — MCP endpoint basic-auth hook (Sprint 8.5)
# =============================================================================
#
# This file is unconditionally imported by the production Caddyfile into the
# {$MCP_HOST} server block. By default it contributes nothing (just comments),
# so the import is a no-op and the MCP endpoint is unauthenticated except for
# the IP allowlist in MCP_IP_ALLOWLIST.
#
# To enable HTTP Basic Auth on the MCP host, REPLACE this whole file with a
# `basic_auth` directive, e.g.:
#
#     basic_auth {
#         operator {$MCP_BASIC_AUTH_HASH}
#     }
#
# Generate the hash with the bundled helper (uses `caddy hash-password`):
#
#     make mcp-gen-credentials
#
# Then put the hash in .env on the prod host:
#
#     MCP_BASIC_AUTH_HASH=$2a$14$abcdef...
#
# Restart Caddy:
#
#     make prod-restart
#
# Test that auth is enforced:
#
#     curl -i https://${MCP_HOST}/sse           # should be 401
#     curl -i -u operator:<password> https://${MCP_HOST}/sse  # should be 200
#
# See infra/caddy/mcp-basic-auth.conf.example for a copy-paste template and
# infra/caddy/README.md for the full hardening recipe.
