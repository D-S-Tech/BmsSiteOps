name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Repo hygiene — runs on every PR regardless of which app changed
  # ---------------------------------------------------------------------------
  repo-hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required documentation exists
        run: |
          for f in README.md LICENSE SECURITY.md CONTRIBUTING.md docs/ARCHITECTURE.md docs/adr/README.md; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::Required file is missing"
              exit 1
            fi
          done

      - name: Verify .env files are not committed
        run: |
          if git ls-files | grep -Ev '^\.env\.example$|^\.env\.[a-z]+\.example$' | grep -E '^\.env'; then
            echo "::error::A non-example .env file is committed"
            exit 1
          fi

      - name: Detect committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

  # ---------------------------------------------------------------------------
  # Laravel API — install, lint with Pint, run the test suite
  # ---------------------------------------------------------------------------
  api:
    name: API (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pdo_sqlite, redis, gd, intl, bcmath, mbstring, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp ../../.env.example .env && echo "APP_KEY=" >> .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run Laravel Pint (formatter)
        run: ./vendor/bin/pint --test

      - name: Run test suite
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test --no-tty
