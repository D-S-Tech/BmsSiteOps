name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Repo hygiene — runs on every PR regardless of which app changed
  # ---------------------------------------------------------------------------
  repo-hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # gitleaks scans the full history

      - name: Verify required documentation exists
        run: |
          for f in README.md LICENSE SECURITY.md CONTRIBUTING.md docs/ARCHITECTURE.md docs/adr/README.md; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::Required file is missing"
              exit 1
            fi
          done

      - name: Verify .env files are not committed
        run: |
          if git ls-files | grep -Ev '^\.env\.example$|^\.env\.[a-z]+\.example$|\.env\.example$' | grep -E '^\.env|/\.env$'; then
            echo "::error::A non-example .env file is committed"
            exit 1
          fi

      # We use the gitleaks binary directly instead of gitleaks-action because
      # the action requires a paid license for organization-owned repos.
      # The binary itself is MIT-licensed and free for everyone.
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan repository for committed secrets
        run: ./gitleaks detect --source . --no-banner --verbose --redact

  # ---------------------------------------------------------------------------
  # Laravel API — install, lint with Pint, run the test suite
  # ---------------------------------------------------------------------------
  api:
    name: API (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pdo_sqlite, redis, gd, intl, bcmath, mbstring, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp ../../.env.example .env && echo "APP_KEY=" >> .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run Laravel Pint (formatter)
        run: ./vendor/bin/pint --test

      - name: Run test suite
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test

  # ---------------------------------------------------------------------------
  # SvelteKit Web — install, prettier+eslint, svelte-check, vitest, build
  # ---------------------------------------------------------------------------
  web:
    name: Web (SvelteKit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Provision .env for build (PUBLIC_API_BASE_URL etc.)
        run: cp .env.example .env

      - name: Lint (prettier + eslint)
        run: npm run lint

      - name: Type check (svelte-check)
        run: npm run check

      - name: Unit tests (vitest)
        run: npm run test

      - name: Production build (adapter-node)
        run: npm run build

  # ---------------------------------------------------------------------------
  # Python Worker — uv sync, ruff, mypy, pytest
  # ---------------------------------------------------------------------------
  worker:
    name: Worker (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: '0.11.16'
          enable-cache: true
          cache-dependency-glob: apps/worker/uv.lock

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy strict
        run: uv run mypy app

      - name: pytest
        run: uv run pytest -ra
